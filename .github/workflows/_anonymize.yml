name: Anonymize (reusable)

on:
  workflow_call:
    inputs:
      validation_failed:
        type: string
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - if: inputs.validation_failed != 'true'
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/
      - if: inputs.validation_failed != 'true'
        run: python main.py --step anonymize
      - uses: actions/upload-artifact@v4
        with:
          name: examples-data
          path: data/examples/latest.json
          retention-days: 1
