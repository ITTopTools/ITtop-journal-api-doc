name: Build Docs Site

on:
  push:
    paths:
      - 'documentation/src/**'
      - 'mkdocs.yml'
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs deps
        run: pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin mkdocs-swagger-ui-tag

      - name: Build site
        run: mkdocs build

      - name: Commit site to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f documentation/site/
          git diff --cached --quiet || git commit -m "docs: rebuild documentation site"
          git push
