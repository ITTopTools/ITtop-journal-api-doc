name: Collect (reusable)

on:
  workflow_call:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - env:
          JOURNAL_LOGIN: ${{ secrets.JOURNAL_LOGIN }}
          JOURNAL_PASSWORD: ${{ secrets.JOURNAL_PASSWORD }}
        run: python main.py --step collect
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/raw/latest.json
          retention-days: 1
