name: MkDocs (reusable)

on:
  workflow_call:

jobs:
  run:
    runs-on: ubuntu-latest
    environment: pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin mkdocs-swagger-ui-tag
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: documentation/src/
      - run: mkdocs build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./documentation/site
          keep_files: true
          destination_dir: docs
