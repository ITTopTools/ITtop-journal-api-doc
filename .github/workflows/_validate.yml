name: Validate (reusable)

on:
  workflow_call:
    outputs:
      validation_failed:
        value: ${{ jobs.run.outputs.validation_failed }}

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      validation_failed: ${{ steps.validate.outputs.validation_failed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/raw/
      - id: validate
        run: python main.py --step validate
      - if: steps.validate.outputs.validation_failed == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "API schema changed — validation failed"
          content-filepath: data/validation_issue.md
          labels: api-change
