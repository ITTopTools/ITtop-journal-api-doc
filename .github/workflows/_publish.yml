name: Publish (reusable)

on:
  workflow_call:

jobs:
  run:
    runs-on: ubuntu-latest
    environment: pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: examples-data
          path: data/examples/
      - run: python main.py --step publish
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: documentation/src/openapi.json
